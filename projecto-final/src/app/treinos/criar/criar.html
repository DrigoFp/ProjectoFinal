<div class="page-container">
  <h2>Criar Treino</h2>
  <p>Preenche os dados para adicionar um novo treino.</p>

  <form [formGroup]="form">
    <!-- Data -->
    <label for="data">Data</label>
    <input id="data" formControlName="data" type="date" placeholder="Data" />
    @if (form.get('data')?.invalid && form.get('data')?.touched) {
      <p class="erro">A data é obrigatória</p>
    }

    <!-- Tipo -->
    <label for="tipo">Tipo de treino</label>
    <select id="tipo" formControlName="tipo" (change)="onTipoChange()">
      <option value="">Escolher tipo</option>
      @for (t of tipos; track t) {
        <option [value]="t.nome">{{ t.nome }}</option>
      }
    </select>

    <!-- Exercício -->
    <label for="exercicio">Exercício</label>
    <select id="exercicio"
            [(ngModel)]="exercicioSelecionado"
            [ngModelOptions]="{standalone: true}"
            (change)="onExercicioChange()"
            [disabled]="!form.get('tipo')?.value">

      <option value="">Escolher exercício</option>

      @for (t of tipos; track t) {
        @if (t.nome === form.get('tipo')?.value) {
          @for (e of t.exercicios; track e) {
            <option [value]="e">{{ e }}</option>
          }
        }
      }
    </select>

    <!-- Carga e Repetições -->
    <div *ngIf="exercicioSelecionado">
      <h3>Detalhes do Exercício</h3>

      <label>Peso:</label>
      <input type="number"
             [(ngModel)]="carga"
             [ngModelOptions]="{standalone: true}" />

      <label>Repetições:</label>
      <input type="number"
             [(ngModel)]="repeticoes"
             [ngModelOptions]="{standalone: true}" />
    </div>

    <!-- Botão -->
    <button type="submit" (click)="criar()" [disabled]="!form.valid || !exercicioSelecionado">
      Inserir
    </button>

  </form>
</div>
